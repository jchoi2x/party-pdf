kind = "web"
previewPath = "/"
title = "PDF Collaboration"
version = "1.0.0"
id = "artifacts/pdf-collab"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23260
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/pdf-collab run dev"

[services.env]
PORT = "23260"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/pdf-collab", "run", "build"]
publicDir = "artifacts/pdf-collab/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
